<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ViroGlobal Event Scanner</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* LOGO */
    . {
      background: #1a1a2e;
      width: 100%;
      max-width: 420px;
      border-radius: 12px;
      padding: 18px;
      text-align: center;
      margin-bottom: 16px;
    }
    .logo-title {
      color: #00d4ff;
      font-size: 26px;
      font-weight: bold;
      letter-spacing: 3px;
    }
    .logo-sub {
      color: #aaa;
      font-size: 12px;
      letter-spacing: 2px;
      margin-top: 4px;
    }

    /* SCANNER */
    #startBtn {
      margin: 12px 0;
      padding: 14px;
      background: #1a1a2e;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      width: 100%;
      max-width: 420px;
    }
    #reader {
      width: 100%;
      max-width: 420px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    #status {
      margin-top: 10px;
      color: #666;
      font-size: 14px;
      text-align: center;
    }

    /* PARTICIPANT CARD */
    #card {
      display: none;
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      overflow: hidden;
      margin-top: 16px;
    }

    .card-header {
      padding: 16px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      color: white;
      letter-spacing: 1px;
    }

    /* Color per type */
    .type-Speaker     { background: #6a0dad; }
    .type-Chairperson { background: #c0392b; }
    .type-Delegate    { background: #1a6a2e; }
    .type-Poster      { background: #d35400; }
    .type-Participant { background: #1a3a6e; }
    .type-Default     { background: #1a1a2e; }

    .card-body { padding: 16px; }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 15px;
    }
    .detail-label { color: #888; font-size: 13px; width: 45%; }
    .detail-value { font-weight: bold; color: #1a1a2e; width: 55%; text-align: right; }

    .welcome-msg {
      margin: 14px 0;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      font-size: 16px;
      font-weight: bold;
    }

    .welcome-Speaker     { background: #f3e6ff; color: #6a0dad; border: 2px solid #6a0dad; }
    .welcome-Chairperson { background: #fde8e8; color: #c0392b; border: 2px solid #c0392b; }
    .welcome-Delegate    { background: #e6f4ea; color: #1a6a2e; border: 2px solid #1a6a2e; }
    .welcome-Poster      { background: #fff0e6; color: #d35400; border: 2px solid #d35400; }
    .welcome-Participant { background: #e6eeff; color: #1a3a6e; border: 2px solid #1a3a6e; }
    .welcome-Default     { background: #e6e6f0; color: #1a1a2e; border: 2px solid #1a1a2e; }

    #confirmBtn {
      width: 100%;
      padding: 14px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 14px;
    }
    #confirmBtn:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    /* RESULT */
    #result {
      display: none;
      width: 100%;
      max-width: 420px;
      padding: 20px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      margin-top: 16px;
    }
    .success { background: #d4edda; color: #155724; border: 2px solid #28a745; }
    .warning { background: #fff3cd; color: #856404; border: 2px solid #ffc107; }
    .error   { background: #f8d7da; color: #721c24; border: 2px solid #dc3545; }

    #scanAgainBtn {
      margin-top: 14px;
      padding: 12px;
      background: #1a1a2e;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      display: none;
      width: 100%;
      max-width: 420px;
    }
  </style>
</head>

  <!-- SCANNER -->
  <button id="startBtn" onclick="startScanner()">Tap to Start Camera</button>
  <p id="status"></p>
  <div id="reader"></div>

  <!-- PARTICIPANT CARD -->
  <div id="card">
    <div class="card-header" id="cardHeader">Participant Details</div>
    <div class="card-body">
      <div class="detail-row">
        <span class="detail-label">Name</span>
        <span class="detail-value" id="pName"></span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Affiliation</span>
        <span class="detail-value" id="pAffiliation"></span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Designation</span>
        <span class="detail-value" id="pDesignation"></span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Presentation Type</span>
        <span class="detail-value" id="pType"></span>
      </div>
      <div class="detail-row" style="border:none;">
        <span class="detail-label">Participation ID</span>
        <span class="detail-value" id="pId"></span>
      </div>

      <div class="welcome-msg" id="welcomeMsg"></div>

      <button id="confirmBtn" onclick="confirmAttendance()">Confirm Attendance</button>
    </div>
  </div>

  <!-- RESULT -->
  <div id="result"></div>
  <button id="scanAgainBtn" onclick="resetScanner()">Scan Next Participant</button>

  <script>
    var scanner;
    var isProcessing = false;
    var started = false;
    var currentUrl = "";
    var DEPLOYMENT_URL = "https://script.google.com/macros/s/AKfycbyKZpOGY7aHbVXOmVBSSYXAGfDEW3j5XpM1l1if8CmiOL7utvJ38jwjKGOxKfKerWDe7A/exec";

    function startScanner() {
      if (started) return;
      started = true;
      document.getElementById("startBtn").style.display = "none";
      document.getElementById("status").innerText = "Starting camera...";
      scanner = new Html5Qrcode("reader");
      scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        onScanSuccess,
        onScanError
      ).then(function() {
        document.getElementById("status").innerText = "Point camera at QR code";
      }).catch(function(err) {
        document.getElementById("status").innerText = "Camera error: " + err;
        started = false;
        document.getElementById("startBtn").style.display = "block";
      });
    }

    function onScanSuccess(decodedText) {
      if (isProcessing) return;
      isProcessing = true;
      currentUrl = decodedText;
      document.getElementById("status").innerText = "Loading details...";

      scanner.stop().then(function() {
        // Fetch participant details first
        fetch(decodedText + "&action=details")
          .then(function(res) { return res.text(); })
          .then(function(data) {
            try {
              var p = JSON.parse(data);
              if (p.error) {
                showResult(p.error, "error");
              } else {
                showCard(p);
              }
            } catch(e) {
              showResult("Error loading details", "error");
            }
          })
          .catch(function() {
            showResult("Network error - try again", "error");
          });
      });
    }

    function onScanError(err) {}

    function showCard(p) {
      document.getElementById("status").innerText = "";

      // Fill details
      document.getElementById("pName").innerText        = p.name        || "-";
      document.getElementById("pAffiliation").innerText = p.affiliation  || "-";
      document.getElementById("pDesignation").innerText = p.designation  || "-";
      document.getElementById("pType").innerText        = p.type         || "-";
      document.getElementById("pId").innerText          = p.id           || "-";

      // Color header and welcome message by type
      var type = p.type || "Default";
      var typeClass = "Default";
      if (type.toLowerCase().includes("speaker"))    typeClass = "Speaker";
      else if (type.toLowerCase().includes("chair")) typeClass = "Chairperson";
      else if (type.toLowerCase().includes("poster"))typeClass = "Poster";
      else if (type.toLowerCase().includes("deleg")) typeClass = "Delegate";
      else if (type.toLowerCase().includes("partic"))typeClass = "Participant";

      var header = document.getElementById("cardHeader");
      header.className = "card-header type-" + typeClass;
      header.innerText = type.toUpperCase();

      var welcomeDiv = document.getElementById("welcomeMsg");
      welcomeDiv.className = "welcome-msg welcome-" + typeClass;
      welcomeDiv.innerText = "Welcome " + type + " to ViroGlobal 2026!";

      // Show card
      document.getElementById("card").style.display = "block";

      // If already marked, disable button
      if (p.status == "Present") {
        document.getElementById("confirmBtn").disabled = true;
        document.getElementById("confirmBtn").innerText = "Already Checked In";
      } else {
        document.getElementById("confirmBtn").disabled = false;
        document.getElementById("confirmBtn").innerText = "Confirm Attendance";
      }
    }

    function confirmAttendance() {
      document.getElementById("confirmBtn").disabled = true;
      document.getElementById("confirmBtn").innerText = "Marking...";

      fetch(currentUrl + "&action=mark")
        .then(function(res) { return res.text(); })
        .then(function(msg) {
          document.getElementById("card").style.display = "none";
          showResult(msg, msg.includes("Marked") ? "success" : "warning");
        })
        .catch(function() {
          showResult("Network error - try again", "error");
        });
    }

    function showResult(msg, type) {
      var resultDiv = document.getElementById("result");
      resultDiv.innerText = msg;
      resultDiv.className = type;
      resultDiv.style.display = "block";
      document.getElementById("scanAgainBtn").style.display = "block";
      document.getElementById("status").innerText = "";
    }

    function resetScanner() {
      isProcessing = false;
      started = false;
      currentUrl = "";
      document.getElementById("card").style.display = "none";
      document.getElementById("result").style.display = "none";
      document.getElementById("scanAgainBtn").style.display = "none";
      document.getElementById("startBtn").style.display = "block";
      document.getElementById("status").innerText = "";
      document.getElementById("reader").innerHTML = "";
    }
  </script>
</body>
</html>
