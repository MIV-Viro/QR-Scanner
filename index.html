<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Scanner</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(to bottom, #ffffff 0%, #ffffff 25%, #a4c9e8 65%, #52a5d2 100%);
      background-attachment: fixed;
    }
    .content-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding: 20px;
    }
    .logo-box {
      width: 100%;
      max-width: 420px;
      padding: 10px;
      text-align: center;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .logo-img {
      width: 100%;
      max-width: 350px;
      height: auto;
      margin-bottom: 15px;
    }
    .logo-title {
      color: #0080ff;
      font-size: 26px;
      font-weight: bold;
      letter-spacing: 3px;
    }
    .logo-sub {
      color: #000000;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 1px;
      margin-top: 6px;
    }
    #startBtn {
      margin: 20px 0;
      padding: 16px;
      background: #ffcc00;
      color: #000000;
      border: 2px solid #e6b800;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.1s;
    }
    #startBtn:active { transform: scale(0.98); }
    #reader {
      width: 100%;
      max-width: 420px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      background: white;
    }
    #status {
      margin-top: 10px;
      color: #333;
      font-size: 14px;
      text-align: center;
      font-weight: bold;
    }
    #card {
      display: none;
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      overflow: hidden;
      margin-top: 16px;
    }
    .card-header {
      padding: 16px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      color: white;
      letter-spacing: 1px;
    }
    /* ALL types = sky blue background, white text */
    .type-Speaker     { background: #0099cc; }
    .type-Chairperson { background: #0099cc; }
    .type-Delegate    { background: #0099cc; }
    .type-Poster      { background: #0099cc; }
    .type-Participant { background: #0099cc; }
    .type-Default     { background: #0099cc; }
    .card-body { padding: 16px; }
    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }
    .detail-label { color: #666; font-size: 13px; width: 40%; }
    .detail-value { font-weight: bold; color: #000; width: 60%; text-align: right; font-size: 14px; }
    /* Participation ID box - sky blue */
    .id-box {
      margin: 12px 0;
      background: #0099cc;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }
    .id-box-label {
      color: white;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .id-box-value {
      color: white;
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 2px;
    }
    .welcome-msg {
      margin: 12px 0;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      font-weight: bold;
      font-size: 15px;
    }
    .welcome-Speaker     { background: #e6f7ff; color: #0099cc; border: 2px solid #0099cc; }
    .welcome-Chairperson { background: #e6f7ff; color: #0099cc; border: 2px solid #0099cc; }
    .welcome-Delegate    { background: #e6f7ff; color: #0099cc; border: 2px solid #0099cc; }
    .welcome-Poster      { background: #e6f7ff; color: #0099cc; border: 2px solid #0099cc; }
    .welcome-Participant { background: #e6f7ff; color: #0099cc; border: 2px solid #0099cc; }
    .welcome-Default     { background: #e6f7ff; color: #0099cc; border: 2px solid #0099cc; }
    #confirmBtn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #ffff00 0%, #ffff00 100%);
      color: #003399;
      border: 2px solid #003399;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 14px;
      letter-spacing: 1px;
      box-shadow: 0 4px 10px rgba(0,51,153,0.2);
      transition: transform 0.1s;
    }
    #confirmBtn:active { transform: scale(0.98); }
    #confirmBtn:disabled {
      background: #aaa;
      color: white;
      border: none;
      cursor: not-allowed;
      box-shadow: none;
    }
    #result {
      display: none;
      width: 100%;
      max-width: 420px;
      padding: 20px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      margin-top: 16px;
    }
    .success { background: #d4edda; color: #155724; border: 2px solid #28a745; }
    .warning { background: #fff3cd; color: #856404; border: 2px solid #ffc107; }
    .error   { background: #f8d7da; color: #721c24; border: 2px solid #dc3545; }
    #scanAgainBtn {
      margin-top: 15px;
      padding: 14px;
      background: #333;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: none;
      width: 100%;
      max-width: 420px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="content-wrapper">
    <div class="logo-box">
      <img src="logo.jpg" alt="ViroGlobal 2026 Logo" class="logo-img">
      <div class="logo-title">EVENT QR SCANNER</div>
      <div class="logo-sub">by Manipal Institute of Virology</div>
    </div>
    <button id="startBtn" onclick="startScanner()">Tap to Start Camera</button>
    <p id="status"></p>
    <div id="reader"></div>
    <div id="card">
      <div class="card-header" id="cardHeader">Participant Details</div>
      <div class="card-body">
        <div class="detail-row">
          <span class="detail-label">Affiliation</span>
          <span class="detail-value" id="pAffiliation"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Designation</span>
          <span class="detail-value" id="pDesignation"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Presentation Type</span>
          <span class="detail-value" id="pType"></span>
        </div>
        <div class="detail-row" style="border:none;">
          <span class="detail-label">Email</span>
          <span class="detail-value" id="pEmail" style="font-size:12px;"></span>
        </div>
        <div class="id-box">
          <div class="id-box-label">Participation ID</div>
          <div class="id-box-value" id="pId"></div>
        </div>
        <div class="welcome-msg" id="welcomeMsg"></div>
        <button id="confirmBtn" onclick="confirmAttendance()">Confirm Attendance</button>
      </div>
    </div>
    <div id="result"></div>
    <button id="scanAgainBtn" onclick="resetScanner()">Scan Next Participant</button>
  </div>
  <script>
    var DEPLOY_URL = "https://script.google.com/macros/s/AKfycbyOxapKyjcN_bDt3BgdW-Mms8jB-xt6iptXc_cE1MkuypEmg65pF41jTVCVkmlQEGuCFQ/exec";
    var scanner;
    var isProcessing = false;
    var currentId = "";

    function startScanner() {
      document.getElementById("startBtn").style.display = "none";
      document.getElementById("status").innerText = "Initializing camera...";
      scanner = new Html5Qrcode("reader");
      scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        onScanSuccess,
        onScanError
      ).then(function() {
        document.getElementById("status").innerText = "Scanning... Align QR inside the box";
      }).catch(function(err) {
        document.getElementById("status").innerText = "Camera error: " + err;
        document.getElementById("startBtn").style.display = "block";
      });
    }

    function onScanSuccess(decodedText) {
      if (isProcessing) return;
      isProcessing = true;
      var extractedId = decodedText;
      if (decodedText.indexOf("?id=") !== -1) {
        extractedId = decodedText.split("?id=")[1];
        if (extractedId.indexOf("&") !== -1) {
          extractedId = extractedId.split("&")[0];
        }
      }
      currentId = extractedId;
      document.getElementById("status").innerText = "Loading details...";
      scanner.stop().then(function() {
        var fetchUrl = DEPLOY_URL + "?id=" + encodeURIComponent(currentId) + "&action=details";
        fetch(fetchUrl)
          .then(function(res) { return res.text(); })
          .then(function(data) {
            try {
              var p = JSON.parse(data);
              if (p.error) {
                showResult(p.error, "error");
              } else {
                showCard(p);
              }
            } catch(e) {
              showResult("Error reading response. Try again.", "error");
            }
          })
          .catch(function() {
            showResult("Connection error. Check internet.", "error");
          });
      });
    }

    function onScanError(err) {}

    function showCard(p) {
      document.getElementById("status").innerText = "";
      document.getElementById("pAffiliation").innerText = p.affiliation || "-";
      document.getElementById("pDesignation").innerText = p.designation || "-";
      document.getElementById("pType").innerText        = p.type        || "-";
      document.getElementById("pEmail").innerText       = p.email       || "-";
      document.getElementById("pId").innerText          = p.id          || "-";

      var type = p.type || "Default";
      var typeClass = "Default";
      if (type.toLowerCase().includes("speaker"))     typeClass = "Speaker";
      else if (type.toLowerCase().includes("chair"))  typeClass = "Chairperson";
      else if (type.toLowerCase().includes("poster")) typeClass = "Poster";
      else if (type.toLowerCase().includes("deleg"))  typeClass = "Delegate";
      else if (type.toLowerCase().includes("partic")) typeClass = "Participant";

      var header = document.getElementById("cardHeader");
      header.className = "card-header type-" + typeClass;
      header.innerText = (p.name || "Participant").toUpperCase();

      var welcomeDiv = document.getElementById("welcomeMsg");
      welcomeDiv.className = "welcome-msg welcome-" + typeClass;
      welcomeDiv.innerText = "Welcome " + (p.name || "Guest") + " to ViroGlobal 2026!";

      var btn = document.getElementById("confirmBtn");
      if (p.status == "Present") {
        btn.disabled = true;
        btn.innerText = "Already Checked In";
        btn.style.background = "#aaa";
        btn.style.color = "white";
        btn.style.border = "none";
      } else {
        btn.disabled = false;
        btn.innerText = "Confirm Attendance";
        btn.style.background = "linear-gradient(135deg, #ffcc00 0%, #f0a500 100%)";
        btn.style.color = "#003399";
        btn.style.border = "2px solid #003399";
      }
      document.getElementById("card").style.display = "block";
    }

    function confirmAttendance() {
      var btn = document.getElementById("confirmBtn");
      btn.disabled = true;
      btn.innerText = "Marking...";
      btn.style.background = "#ccc";
      btn.style.color = "#333";
      btn.style.border = "none";

      var markUrl = DEPLOY_URL + "?id=" + encodeURIComponent(currentId) + "&action=mark";
      fetch(markUrl, { redirect: "follow" })
        .then(function(res) { return res.text(); })
        .then(function(msg) {
          document.getElementById("card").style.display = "none";
          if (msg.includes("Already")) {
            showResult("Already Checked In", "warning");
          } else {
            showResult("Attendance Confirmed!", "success");
          }
          setTimeout(function() { resetScanner(); }, 2000);
        })
        .catch(function() {
          document.getElementById("card").style.display = "none";
          showResult("Attendance Confirmed!", "success");
          setTimeout(function() { resetScanner(); }, 2000);
        });
    }

    function showResult(msg, type) {
      var resDiv = document.getElementById("result");
      resDiv.innerText = msg;
      resDiv.className = type;
      resDiv.style.display = "block";
      document.getElementById("scanAgainBtn").style.display = "none";
      document.getElementById("status").innerText = "";
    }

    function resetScanner() {
      isProcessing = false;
      currentId = "";
      document.getElementById("card").style.display = "none";
      document.getElementById("result").style.display = "none";
      document.getElementById("scanAgainBtn").style.display = "none";
      document.getElementById("startBtn").style.display = "block";
      document.getElementById("status").innerText = "";
      document.getElementById("reader").innerHTML = "";
    }
  </script>
</body>
</html>
