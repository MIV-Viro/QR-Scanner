<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Scanner</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      /* Background gradient: White at top, blue shades from middle */
      background: #ffffff;
      background: linear-gradient(to bottom, #ffffff 0%, #ffffff 25%, #a4c9e8 65%, #52a5d2 100%);
      background-attachment: fixed;
    }

    .content-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding: 20px;
    }

    /* LOGO SECTION - Background removed to merge with body */
    .logo-box {
      width: 100%;
      max-width: 420px;
      padding: 10px;
      text-align: center;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo-img {
      width: 100%;
      max-width: 350px;
      height: auto;
      margin-bottom: 15px;
    }

    .logo-title {
      color: #0080ff; /* Adjusted blue for better visibility on white */
      font-size: 26px;
      font-weight: bold;
      letter-spacing: 3px;
    }

    .logo-sub {
      color: #000000; /* Text color changed to Black */
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 1px;
      margin-top: 6px;
    }

    /* SCANNER BUTTON - Yellow Box */
    #startBtn {
      margin: 20px 0;
      padding: 16px;
      background: #ffcc00; /* Bright Yellow */
      color: #000000;
      border: 2px solid #e6b800;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.1s;
    }
    
    #startBtn:active {
      transform: scale(0.98);
    }

    #reader {
      width: 100%;
      max-width: 420px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      background: white;
    }

    #status {
      margin-top: 10px;
      color: #333;
      font-size: 14px;
      text-align: center;
      font-weight: bold;
    }

    /* PARTICIPANT CARD */
    #card {
      display: none;
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      overflow: hidden;
      margin-top: 16px;
    }

    .card-header {
      padding: 16px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      color: white;
    }

    .type-Speaker      { background: #6a0dad; }
    .type-Chairperson { background: #c0392b; }
    .type-Delegate    { background: #1a6a2e; }
    .type-Poster      { background: #d35400; }
    .type-Participant { background: #1a3a6e; }
    .type-Default      { background: #1a1a2e; }

    .card-body { padding: 16px; }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }
    .detail-label { color: #666; font-size: 13px; width: 40%; }
    .detail-value { font-weight: bold; color: #000; width: 60%; text-align: right; }

    .welcome-msg {
      margin: 15px 0;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      font-weight: bold;
    }

    /* RESULT MESSAGES */
    #result {
      display: none;
      width: 100%;
      max-width: 420px;
      padding: 20px;
      border-radius: 12px;
      font-weight: bold;
      text-align: center;
      margin-top: 16px;
    }
    .success { background: #d4edda; color: #155724; border: 2px solid #28a745; }
    .error   { background: #f8d7da; color: #721c24; border: 2px solid #dc3545; }

    #scanAgainBtn {
      margin-top: 15px;
      padding: 14px;
      background: #333;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: none;
      width: 100%;
      max-width: 420px;
    }
  </style>
</head>
<body>

  <div class="content-wrapper">
    <div class="logo-box">
      <img src="logo.jpg" alt="ViroGlobal 2026 Logo" class="logo-img">
      <div class="logo-title">EVENT QR SCANNER</div>
      <div class="logo-sub">by Manipal Institute of Virology</div>
    </div>

    <button id="startBtn" onclick="startScanner()">Tap to Start Camera</button>
    
    <p id="status"></p>
    <div id="reader"></div>

    <div id="card">
      <div class="card-header" id="cardHeader">Participant Details</div>
      <div class="card-body">
        <div class="detail-row">
          <span class="detail-label">Name</span>
          <span class="detail-value" id="pName"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Affiliation</span>
          <span class="detail-value" id="pAffiliation"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Type</span>
          <span class="detail-value" id="pType"></span>
        </div>
        <div class="detail-row" style="border:none;">
          <span class="detail-label">ID</span>
          <span class="detail-value" id="pId"></span>
        </div>

        <div class="welcome-msg" id="welcomeMsg"></div>

        <button id="confirmBtn" style="width:100%; padding:14px; background:#28a745; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;" onclick="confirmAttendance()">Confirm Attendance</button>
      </div>
    </div>

    <div id="result"></div>
    <button id="scanAgainBtn" onclick="resetScanner()">Scan Next Participant</button>
  </div>

  <script>
    // --- CHANGE YOUR URL HERE ---
    const DEPLOY_URL = "https://script.google.com/macros/s/AKfycbyOxapKyjcN_bDt3BgdW-Mms8jB-xt6iptXc_cE1MkuypEmg65pF41jTVCVkmlQEGuCFQ/exec"; 
    // ----------------------------

    var scanner;
    var isProcessing = false;
    var currentParticipantId = ""; // Renamed for clarity
    
    function startScanner() {
      document.getElementById("startBtn").style.display = "none";
      document.getElementById("status").innerText = "Initializing camera...";
      
      scanner = new Html5Qrcode("reader");
      scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        onScanSuccess,
        onScanError
      ).then(() => {
        document.getElementById("status").innerText = "Scanning... Align QR inside the box";
      }).catch(err => {
        document.getElementById("status").innerText = "Error: " + err;
        document.getElementById("startBtn").style.display = "block";
      });
    }

    function onScanSuccess(decodedText) {
      if (isProcessing) return;
      isProcessing = true;
      
      // Store the scanned ID (e.g., MIV-2026-001)
      currentParticipantId = decodedText;

      scanner.stop().then(() => {
        document.getElementById("status").innerText = "Fetching data...";
        
        // Constructs URL like: DEPLOY_URL?id=XYZ&action=details
        const fetchUrl = `${DEPLOY_URL}?id=${encodeURIComponent(decodedText)}&action=details`;

        fetch(fetchUrl)
          .then(res => res.json())
          .then(p => {
            if (p.error) {
              showResult(p.error, "error");
            } else {
              showCard(p);
            }
          })
          .catch(() => showResult("Connection Error - Check URL or Internet", "error"));
      });
    }

    function onScanError(err) { /* Ignore noise */ }

    function showCard(p) {
      document.getElementById("status").innerText = "";
      document.getElementById("pName").innerText = p.name || "-";
      document.getElementById("pAffiliation").innerText = p.affiliation || "-";
      document.getElementById("pType").innerText = p.type || "Participant";
      document.getElementById("pId").innerText = p.id || "-";

      let typeClass = "Default";
      const t = (p.type || "").toLowerCase();
      if (t.includes("speaker")) typeClass = "Speaker";
      else if (t.includes("chair")) typeClass = "Chairperson";
      else if (t.includes("deleg")) typeClass = "Delegate";
      
      document.getElementById("cardHeader").className = "card-header type-" + typeClass;
      document.getElementById("welcomeMsg").innerText = "Welcome to ViroGlobal 2026!";
      document.getElementById("card").style.display = "block";
    }

    function confirmAttendance() {
      document.getElementById("confirmBtn").innerText = "Processing...";
      
      // Constructs URL like: DEPLOY_URL?id=XYZ&action=mark
      const markUrl = `${DEPLOY_URL}?id=${encodeURIComponent(currentParticipantId)}&action=mark`;

      fetch(markUrl)
        .then(res => res.text())
        .then(msg => {
          document.getElementById("card").style.display = "none";
          showResult(msg, "success");
        })
        .catch(() => {
          showResult("Failed to save. Try again.", "error");
          document.getElementById("confirmBtn").innerText = "Confirm Attendance";
        });
    }

    function showResult(msg, type) {
      const resDiv = document.getElementById("result");
      resDiv.innerText = msg;
      resDiv.className = type;
      resDiv.style.display = "block";
      document.getElementById("scanAgainBtn").style.display = "block";
    }

    function resetScanner() {
      isProcessing = false;
      document.getElementById("card").style.display = "none";
      document.getElementById("result").style.display = "none";
      document.getElementById("scanAgainBtn").style.display = "none";
      document.getElementById("startBtn").style.display = "block";
      document.getElementById("status").innerText = "";
      document.getElementById("reader").innerHTML = "";
    }
  </script>
